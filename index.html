<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- Title and logo -->
    <title>Tonic-English</title>
    <link rel="shortcut icon" href="./assets/glossy-test-tube.png" type="image/x-icon">
    <!-- custom csss -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- header section -->
    <header class="">
        <!-- navbar section -->
        <section class="shadow-sm bg-base-100 shadow-green-400">
            <nav class="max-w-5/6 mx-auto py-5 z-10 sticky">
                <div class="flex justify-between space-y-2 md:space-y-0">
                    <div class="text-center">
                        <a class="btn btn-ghost text-xl font-semibold font-bangla">টনিক <span><img width="41px"
                                    height="40px" src="./assets/test-tube.png" alt="logo"></span> English </a>
                    </div>
                    <div class="hidden md:block">
                        <ul class="menu menu-horizontal px-1 space-x-3">
                            <li><a class="btn btn-outline btn-success text-sm font-semibold"><i
                                        class="fa-solid fa-circle-question"></i> FAQ</a></li>
                            <li><a class="btn btn-outline btn-success text-sm font-semibold"><i
                                        class="fa-solid fa-book-open"></i>
                                    Learn</a></li>
                            <li><a class="btn btn-outline btn-success text-sm font-semibold"> <i
                                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a></li>
                        </ul>
                    </div>
                    <div class="dropdown md:hidden">
                        <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16M4 18h7" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a>FAQ</a></li>
                            <li><a>Learn</a></li>
                            <li><a>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </section>


        <!-- banner section -->
        <section class="max-w-5/6 mx-auto py-16">
            <div class="min-h-screen">
                <div class="flex flex-col lg:flex-row-reverse justify-between items-center space-y-12">
                    <img src="assets/hero.png" class="max-w-full md:max-w-lg rounded-lg shadow-2xl" />
                    <div class="max-w-1/2">
                        <h1 class="text-5xl font-bold"><span class="text-lime-500">English</span> is fun!</h1>
                        <p class="py-6">
                            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান,
                            আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                        </p>
                        <div class="space-y-3">
                            <fieldset class="fieldset space-y-3">
                                <input type="text" class="input" placeholder="Type Your Name" />
                                <input type="password" class="input" placeholder="Password" />
                            </fieldset>
                            <button class="btn btn-success">Get Started</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </header>


    <main>

    </main>

    <footer>

    </footer>

    <!-- scripts -->
    <script src="scripts/script.js"></script>
</body>

</html>
